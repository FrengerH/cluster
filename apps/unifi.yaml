apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: unifi
spec:
  syncPolicy:
    syncOptions:
    - CreateNamespace=true
  destination:
    name: in-cluster
    namespace: unifi
  sources:
  - repoURL: 'https://github.com/FrengerH/cluster'
    targetRevision: HEAD
    path: apps/unifi
  project: default
