apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: searxng
spec:
  syncPolicy:
    syncOptions:
    - CreateNamespace=true
  destination:
    name: in-cluster
    namespace: searxng
  sources:
    - repoURL: 'https://github.com/frengerh/cluster'
      path: apps/values/searxng
      targetRevision: HEAD
      plugin: # we just use the plugin source, the plugin script will do the helm pull and template
        env: #set the variables needed 
          - name: HELM_VALUES_FILES
            value: "values.yaml"
          - name: HELM_REPO_URL
            value: "https://self-hosters-by-night.github.io/helm-charts"
          - name: HELM_CHART_NAME
            value: "searxng"
          - name: HELM_CHART_VERSION
            value: "1.1.0"
          - name: HELM_RELEASE_NAME
            value: "searxng"
  project: default
