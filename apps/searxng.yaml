apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: searxng
spec:
  syncPolicy:
    syncOptions:
    - CreateNamespace=true
  destination:
    name: in-cluster
    namespace: default
  sources:
    - repoURL: 'https://github.com/bkero/searxng-helm-chart'
      path: charts/searxng
      targetRevision: HEAD
      helm:
        valueFiles:
          - $values/values.yaml
    - repoURL: 'https://github.com/frengerh/cluster'
      ref: values
      targetRevision: HEAD
  project: default
