ingress:
  enabled: true
  className: traefik
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    traefik.ingress.kubernetes.io/router.tls: "true"
  tls:
    - hosts:
        - <path:supabase-config#domain>
      secretName: tls-supabase-ingress
  hosts:
    - host: <path:supabase-config#domain>
      paths:
        - path: /
          pathType: Prefix

persistence:
  db:
    enabled: true
    storageClassName: longhorn
    size: 10Gi
    accessModes:
      - ReadWriteOnce
  storage:
    enabled: true
    storageClassName: longhorn
    size: 10Gi
    accessModes:
      - ReadWriteOnce

deployment:
  analytics:
    enabled: false
  vector:
    enabled: false
  imgproxy:
    enabled: false
  functions:
    enabled: false
  db:
    resources:
      requests:
        ephemeral-storage: 1Gi
      limits:
        ephemeral-storage: 2Gi
  auth:
    resources:
      requests:
        ephemeral-storage: 256Mi
      limits:
        ephemeral-storage: 512Mi
  kong:
    resources:
      requests:
        ephemeral-storage: 256Mi
      limits:
        ephemeral-storage: 512Mi
  meta:
    resources:
      requests:
        ephemeral-storage: 256Mi
      limits:
        ephemeral-storage: 512Mi
  realtime:
    resources:
      requests:
        ephemeral-storage: 256Mi
      limits:
        ephemeral-storage: 512Mi
  rest:
    resources:
      requests:
        ephemeral-storage: 256Mi
      limits:
        ephemeral-storage: 512Mi
  storage:
    resources:
      requests:
        ephemeral-storage: 256Mi
      limits:
        ephemeral-storage: 512Mi
  studio:
    resources:
      requests:
        ephemeral-storage: 256Mi
      limits:
        ephemeral-storage: 512Mi

environment:
  auth:
    API_EXTERNAL_URL: https://<path:supabase-config#domain>
    GOTRUE_SITE_URL: https://<path:supabase-config#domain>
  studio:
    SUPABASE_PUBLIC_URL: https://<path:supabase-config#domain>
