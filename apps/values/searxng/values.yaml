image:
  repository: searxng/searxng
  tag: ""
  pullPolicy: Always

replicaCount: 1

service:
  type: ClusterIP
  port: 80

ingress:
  enabled: true
  className: traefik
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    traefik.ingress.kubernetes.io/router.tls: "true"
  hosts:
    - host: <path:searxng-config#domain>
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: tls-searxng-ingress
      hosts:
        - <path:searxng-config#domain>

env:
  BASE_URL: "https://<path:searxng-config#domain>/"
  INSTANCE_NAME: SearXNG
  AUTOCOMPLETE: "true"

searxng:
  existingSecret: searxng-config
  existingSecretKey: secret_key
  settings:
    use_default_settings: true
