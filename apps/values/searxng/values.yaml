image:
  repository: searxng/searxng
  tag: ""
  pullPolicy: Always

replicaCount: 1

service:
  type: ClusterIP
  port: 80

ingress:
  enabled: true
  className: traefik
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    traefik.ingress.kubernetes.io/router.tls: "true"
  hosts:
    - host: <path:searxng-config#domain>
      paths:
        - path: /
          pathType: ImplementationSpecific
  tls:
    - secretName: tls-searxng-ingress
      hosts:
        - <path:searxng-config#domain>

env:
  vars:
    BASE_URL: "https://<path:searxng-config#domain>/"
  fromSecret:
    SEARXNG_SECRET:
      from: searxng-config
      key: secret_key
      optional: false
